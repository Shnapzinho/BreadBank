<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread Bank | Твой цифровой кошелек</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-8">
        <!-- Заголовок -->
        <div class="text-center">
            <h1 class="text-4xl font-extrabold text-blue-500 tracking-tight">BREAD<span class="text-white">BANK</span></h1>
            <p class="text-slate-400 mt-2">Безопасное управление твоими финансами</p>
        </div>

        <!-- Основная карточка -->
        <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">

            <!-- Форма входа/регистрации -->
            <div id="auth-section" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300">Email</label>
                    <input id="email" type="email" class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="name@mail.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300">Пин-код (4 цифры)</label>
                    <input id="pin" type="password" maxlength="4" class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="****">
                </div>
                <div class="flex gap-2">
                    <button onclick="register()" class="flex-1 bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-semibold transition-all">Регистрация</button>
                    <button onclick="login()" class="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-semibold transition-all">Войти</button>
                </div>
                <!-- Новая кнопка ниже -->
                <button onclick="unban()" class="w-full mt-2 text-slate-400 text-xs hover:text-white transition-all underline">Забыли пин-код или аккаунт заблокирован?</button>
            </div>

            <div id="dashboard" class="hidden space-y-6">
                <div class="text-center p-4 bg-blue-600/20 rounded-2xl border border-blue-500/30">
                    <p class="text-slate-300 text-sm">Ваш баланс</p>
                    <h2 id="balance-view" class="text-3xl font-bold text-white mt-1">0 ₽</h2>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="action('deposit')" class="p-4 glass hover:bg-slate-700 rounded-2xl flex flex-col items-center gap-2 transition-all">
                        <i class="fas fa-plus-circle text-green-400 text-xl"></i>
                        <span>Пополнить</span>
                    </button>
                    <button onclick="action('withdraw')" class="p-4 glass hover:bg-slate-700 rounded-2xl flex flex-col items-center gap-2 transition-all">
                        <i class="fas fa-minus-circle text-red-400 text-xl"></i>
                        <span>Снять</span>
                    </button>
                    <button onclick="transfer()" class="p-4 glass hover:bg-slate-700 rounded-2xl flex flex-col items-center gap-2 transition-all">
                        <i class="fas fa-exchange-alt text-blue-400 text-xl"></i>
                        <span>Перевод</span>
                    </button>
                </div>

                <button onclick="location.reload()" class="w-full text-slate-500 text-sm hover:text-white transition-all">Выйти из аккаунта</button>
            </div>
        </div>

    
        <div id="status" class="text-center text-sm font-medium h-4"></div>
    </div>

    <script>
        const API_URL = "https://localhost:7170/api/Bank"; 

        function showStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.className = isError ? "text-center text-red-400" : "text-center text-green-400";
        }

        async function register() {
            const email = document.getElementById('email').value;
            const pin = document.getElementById('pin').value;

            try {
                const response = await fetch(`${API_URL}/register?mail=${email}&pin=${pin}`, { method: 'POST' });
                const data = await response.text();
                if (response.ok) showStatus("Успешная регистрация! Теперь войдите.");
                else showStatus(data, true);
            } catch (e) { showStatus("Ошибка подключения к серверу", true); }
        }

		// Функция только для обновления цифры баланса на экране
		async function updateBalance() {
			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;

			try {
				const response = await fetch(`${API_URL}/balance?mail=${email}&pin=${pin}`);
				const data = await response.json();
				if (response.ok) {
					document.getElementById('balance-view').innerText = data.currentBalance + " ₽";
				}
			} catch (e) { console.error("Не удалось обновить баланс"); }
		}

		async function login() {
			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;

			try {
				const response = await fetch(`${API_URL}/balance?mail=${email}&pin=${pin}`);

				if (response.ok) {
					// Если всё хорошо (200 OK), читаем как JSON
					const data = await response.json();
					document.getElementById('balance-view').innerText = data.currentBalance + " ₽";
					document.getElementById('auth-section').classList.add('hidden');
					document.getElementById('dashboard').classList.remove('hidden');
					showStatus("Вход выполнен");
				} else {
					// Если ошибка (400 BadRequest), читаем текст ошибки, который прислал C#
					const errorText = await response.text();
					showStatus(errorText, true); // <--- Теперь тут будет твой текст про попытки
				}
			} catch (e) {
				// Сюда попадем только если сервер ВООБЩЕ не ответил (выключен)
				showStatus("Сервер недоступен", true);
			}
		}

		async function action(type) {
			const amount = prompt("Введите сумму:");
			if (!amount || amount <= 0) return;

			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;

			try {
				const response = await fetch(`${API_URL}/${type}?mail=${email}&pin=${pin}&amount=${amount}`, { method: 'POST' });
				const data = await response.text();

				if (response.ok) {
					showStatus(type === 'deposit' ? "Счет пополнен!" : "Деньги сняты!");
					await updateBalance(); // ВЫЗЫВАЕМ ТИХОЕ ОБНОВЛЕНИЕ
				} else {
					showStatus(data, true);
				}
			} catch (e) { showStatus("Ошибка операции", true); }
        }
		async function unban() {
			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;

			if (!email || !pin) {
				showStatus("Введите Email и Пин-код для разблокировки", true);
				return;
			}

			try {
				const response = await fetch(`${API_URL}/unban?mail=${email}&pin=${pin}`, {
					method: 'POST'
				});
				const data = await response.text();

				if (response.ok) {
					showStatus("Доступ восстановлен! Попробуйте войти.");
				} else {
					showStatus(data, true);
				}
			} catch (e) {
				showStatus("Ошибка подключения к серверу", true);
			}
        }
		async function transfer() {
			const targetMail = prompt("Введите Email получателя:");
			if (!targetMail) return;

			const amount = prompt("Введите сумму перевода:");
			if (!amount || amount <= 0) return;

			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;

			try {
				const response = await fetch(`${API_URL}/transfer?mail=${email}&pin=${pin}&targetMail=${targetMail}&amount=${amount}`, {
					method: 'POST'
				});
				const data = await response.text();

				if (response.ok) {
					showStatus("Перевод выполнен!");
					await updateBalance(); // Обновляем твой баланс на экране
				} else {
					showStatus(data, true);
				}
			} catch (e) {
				showStatus("Ошибка подключения", true);
			}
		}
    </script>
</body>
</html>
