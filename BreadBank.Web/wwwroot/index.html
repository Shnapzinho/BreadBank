<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BREAD BANK | Digital</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

		body {
			font-family: 'Inter', sans-serif;
			background: radial-gradient(circle at top right, #1e293b, #0f172a);
			color: white;
		}

		.glass {
			background: rgba(30, 41, 59, 0.6);
			backdrop-filter: blur(12px);
			border: 1px solid rgba(255,255,255,0.05);
		}

		.card-gradient {
			background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
		}

		.btn-hover {
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

			.btn-hover:hover {
				transform: translateY(-2px);
				box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
			}

		#history-list::-webkit-scrollbar {
			width: 4px;
		}

		#history-list::-webkit-scrollbar-thumb {
			background: #334155;
			border-radius: 10px;
		}
	</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

	<div class="max-w-md w-full space-y-6">
		<!-- Логотип -->
		<div class="text-center space-y-2">
			<div class="inline-block p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-500/20 mb-2">
				<i class="fas fa-bread-slice text-2xl"></i>
			</div>
			<h1 class="text-3xl font-bold tracking-tighter">BREAD<span class="text-blue-500">BANK</span></h1>
		</div>

		<!-- Контейнер -->
		<div class="glass rounded-[2.5rem] shadow-2xl p-8 relative overflow-hidden">

			<!-- Секция авторизации -->
			<div id="auth-section" class="space-y-6">
				<div class="space-y-4">
					<div class="relative">
						<i class="fas fa-envelope absolute left-4 top-4 text-slate-500 text-sm"></i>
						<input id="email" type="email" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-3.5 pl-11 pr-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Email адрес">
					</div>
					<div class="relative">
						<i class="fas fa-lock absolute left-4 top-4 text-slate-500 text-sm"></i>
						<input id="pin" type="password" maxlength="4" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-3.5 pl-11 pr-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Пин-код">
					</div>
				</div>

				<div class="flex flex-col gap-3">
					<button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold btn-hover shadow-lg shadow-blue-600/20">Войти в банк</button>
					<button onclick="register()" class="w-full bg-slate-700/50 hover:bg-slate-700 py-4 rounded-2xl font-semibold btn-hover">Создать аккаунт</button>
				</div>

				<button onclick="unban()" class="w-full text-slate-500 text-xs hover:text-blue-400 transition-colors uppercase tracking-widest font-bold">Разблокировать доступ</button>
			</div>

			<!-- Дашборд -->
			<div id="dashboard" class="hidden space-y-8">
				<!-- Виджет карты -->
				<div class="card-gradient rounded-3xl p-6 shadow-xl relative overflow-hidden">
					<div class="absolute top-0 right-0 p-4 opacity-20">
						<i class="fas fa-wifi text-4xl -rotate-45"></i>
					</div>
					<p class="text-blue-100 text-xs font-semibold uppercase tracking-wider">Текущий баланс</p>
					<div class="flex items-end gap-2 mt-2">
						<h2 id="balance-view" class="text-4xl font-bold tracking-tight">0</h2>
						<span class="text-2xl mb-1 font-light opacity-80">₽</span>
					</div>
					<div class="mt-8 flex justify-between items-center">
						<p class="text-sm font-mono tracking-widest opacity-70">**** **** **** 2024</p>
						<i class="fab fa-cc-visa text-2xl"></i>
					</div>
				</div>

				<!-- Кнопки действий -->
				<div class="grid grid-cols-4 gap-2">
					<!-- Изменили на 4 колонки и уменьшили gap -->
					<button onclick="action('deposit')" class="flex flex-col items-center gap-3">
						<div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 btn-hover border border-emerald-500/20">
							<i class="fas fa-arrow-down text-sm"></i>
						</div>
						<span class="text-[9px] uppercase font-bold text-slate-400">Ввод</span>
					</button>
					<button onclick="transfer()" class="flex flex-col items-center gap-3">
						<div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 btn-hover border border-blue-500/20">
							<i class="fas fa-random text-sm"></i>
						</div>
						<span class="text-[9px] uppercase font-bold text-slate-400">Перевод</span>
					</button>
					<button onclick="action('withdraw')" class="flex flex-col items-center gap-3">
						<div class="w-12 h-12 bg-rose-500/10 rounded-2xl flex items-center justify-center text-rose-500 btn-hover border border-rose-500/20">
							<i class="fas fa-arrow-up text-sm"></i>
						</div>
						<span class="text-[9px] uppercase font-bold text-slate-400">Вывод</span>
					</button>
					<!-- НОВАЯ КНОПКА -->
					<button onclick="changePin()" class="flex flex-col items-center gap-3">
						<div class="w-12 h-12 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-500 btn-hover border border-amber-500/20">
							<i class="fas fa-key text-sm"></i>
						</div>
						<span class="text-[9px] uppercase font-bold text-slate-400">ПИН</span>
					</button>
				</div>

				<!-- История -->
				<div id="history-section" class="space-y-4">
					<div class="flex justify-between items-center">
						<h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Последние операции</h3>
						<i class="fas fa-history text-slate-600 text-xs"></i>
					</div>
					<div id="history-list" class="space-y-3 max-h-52 overflow-y-auto pr-1">
						<!-- Транзакции -->
					</div>
				</div>

				<button onclick="logout()" class="w-full text-slate-500 text-[10px] font-bold uppercase tracking-widest hover:text-rose-400 transition-colors">Прервать сессию</button>
			</div>
		</div>

		<!-- Уведомления -->
		<div id="status" class="text-center text-sm font-medium min-h-[1.25rem]"></div>
	</div>

	<script>
		const API_URL = "http://localhost:7170/api/Bank";

		function showStatus(msg, isError = false) {
			const el = document.getElementById('status');
			el.innerText = msg;
			el.className = isError ? "text-center text-rose-400 animate-pulse" : "text-center text-emerald-400";
			setTimeout(() => { if (el.innerText === msg) el.innerText = ""; }, 4000);
		}

		async function getErrorMessage(response) {
			if (response.status === 401) {
				logout();
				return "Сессия истекла. Войдите заново.";
			}

			const text = await response.text();
			try {
				const json = JSON.parse(text);
				if (json.errors) return Object.values(json.errors).flat().join(". ");
				return json.title || text;
			} catch (e) { return text; }
		}

		async function updateHistory() {
			const token = localStorage.getItem('bank_token');
			try {
				const response = await fetch(`${API_URL}/history`, {
					headers: { 'Authorization': `Bearer ${token}` }
				});
				if (response.ok) {
					const txs = await response.json();
					const list = document.getElementById('history-list');
					document.getElementById('history-section').classList.remove('hidden');
					list.innerHTML = txs.length ? "" : "<p class='text-center text-slate-600 py-4 text-xs'>История пуста</p>";

					txs.forEach(t => {
						const isPos = t.amount > 0;
						const icon = t.type.includes("Пополнение") ? "fa-arrow-trend-up" : "fa-arrow-trend-down";
						list.innerHTML += `
								<div class="flex justify-between items-center p-4 bg-slate-800/30 rounded-2xl border border-white/5">
									<div class="flex items-center gap-3">
										<div class="w-8 h-8 rounded-full ${isPos ? 'bg-emerald-500/20 text-emerald-500' : 'bg-rose-500/20 text-rose-500'} flex items-center justify-center text-[10px]">
											<i class="fas ${icon}"></i>
										</div>
										<div>
											<p class="text-xs font-bold">${t.type}</p>
											<p class="text-[10px] text-slate-500">${new Date(t.createdAt).toLocaleDateString()}</p>
										</div>
									</div>
									<span class="text-xs font-bold ${isPos ? 'text-emerald-400' : 'text-white'}">${isPos ? '+' : ''}${t.amount} ₽</span>
								</div>`;
					});
				}
			} catch (e) { console.error(e); }
		}

		async function login() {
			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;
			if (!email || !pin) return showStatus("Введите данные", true);

			try {
				const res = await fetch(`${API_URL}/login?mail=${email}&pin=${pin}`, { method: 'POST' });
				if (res.ok) {
					const data = await res.json();
					localStorage.setItem('bank_token', data.token);
					document.getElementById('auth-section').classList.add('hidden');
					document.getElementById('dashboard').classList.remove('hidden');
					showStatus("Добро пожаловать в BREAD BANK");
					await updateBalance();
				} else showStatus(await getErrorMessage(res), true);
			} catch (e) { showStatus("Сервер не отвечает", true); }
		}

		async function updateBalance() {
			const token = localStorage.getItem('bank_token');
			if (!token) return;
			try {
				const res = await fetch(`${API_URL}/balance`, {
					headers: { 'Authorization': `Bearer ${token}` }
				});
				if (res.ok) {
					const data = await res.json();
					document.getElementById('balance-view').innerText = data.currentBalance.toLocaleString();
					await updateHistory();
				} else showStatus(await getErrorMessage(res), true);
			} catch (e) { console.error(e); }
		}

		async function action(type) {
			const amount = prompt("Введите сумму:");
			if (!amount || isNaN(amount) || amount <= 0) return;

			const token = localStorage.getItem('bank_token');
			try {
				const res = await fetch(`${API_URL}/${type}?amount=${amount}`, {
					method: 'POST',
					headers: { 'Authorization': `Bearer ${token}` }
				});
				if (res.ok) {
					showStatus("Операция успешно проведена");
					await updateBalance();
				} else showStatus(await getErrorMessage(res), true);
			} catch (e) { showStatus("Ошибка сети", true); }
		}

		async function transfer() {
			const mail = prompt("Email получателя:");
			const amount = prompt("Сумма:");
			if (!mail || !amount || isNaN(amount) || amount <= 0) return;

			const token = localStorage.getItem('bank_token');
			try {
				const res = await fetch(`${API_URL}/transfer?targetMail=${mail}&amount=${amount}`, {
					method: 'POST',
					headers: { 'Authorization': `Bearer ${token}` }
				});
				if (res.ok) {
					showStatus("Деньги отправлены");
					await updateBalance();
				} else showStatus(await getErrorMessage(res), true);
			} catch (e) { showStatus("Ошибка сети", true); }
		}

		async function register() {
			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;
			if (!email.includes('@') || pin.length !== 4) return showStatus("Проверьте Email и Пин", true);

			try {
				const res = await fetch(`${API_URL}/register?mail=${email}&pin=${pin}`, { method: 'POST' });
				if (res.ok) showStatus("Аккаунт создан! Теперь войдите.");
				else showStatus(await getErrorMessage(res), true);
			} catch (e) { showStatus("Ошибка сервера", true); }
		}

		async function unban() {
			const email = document.getElementById('email').value;
			const pin = document.getElementById('pin').value;
			try {
				const res = await fetch(`${API_URL}/unban?mail=${email}&pin=${pin}`, { method: 'POST' });
				if (res.ok) showStatus("Доступ восстановлен");
				else showStatus(await getErrorMessage(res), true);
			} catch (e) { showStatus("Ошибка сети", true); }
		}

		async function changePin() {
			const newPin = prompt("Введите новый 4-значный пин-код (только цифры):");

			// Валидация на стороне клиента
			if (!newPin) return;
			if (newPin.length !== 4 || isNaN(newPin)) {
				showStatus("Пин-код должен состоять из 4 цифр", true);
				return;
			}

			const token = localStorage.getItem('bank_token');
			try {
				const res = await fetch(`${API_URL}/change-pin`, {
					method: 'POST',
					headers: {
						'Authorization': `Bearer ${token}`,
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({ newPin: newPin })
				});

				if (res.ok) {
					showStatus("Пин-код успешно изменен");
				} else {
					showStatus(await getErrorMessage(res), true);
				}
			} catch (e) {
				showStatus("Ошибка сети", true);
			}
		}

		function logout() {
			localStorage.removeItem('bank_token');
			location.reload();
		}

		window.onload = async () => {
			const token = localStorage.getItem('bank_token');
			if (token) {
				const res = await fetch(`${API_URL}/balance`, {
					headers: { 'Authorization': `Bearer ${token}` }
				});
				if (res.ok) {
					document.getElementById('auth-section').classList.add('hidden');
					document.getElementById('dashboard').classList.remove('hidden');
					const data = await res.json();
					document.getElementById('balance-view').innerText = data.currentBalance.toLocaleString();
					await updateHistory();
				} else localStorage.removeItem('bank_token');
			}
		};
	</script>
</body>
</html>
