name: bread-bank
version: '3.8'

services:
    db:
        image: postgres
        container_name: bank-db-container
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: bank_db 
        ports: 
            - "5432:5432"

    app:
        build: .
        container_name: bank-app-container
        restart: on-failure
        environment:
            - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=bank_db;Username=postgres;Password=postgres
            - Jwt__Key=SuperSecretKey2026BreadBankzxc123
            - Jwt__Issuer=BreadBankIssuer
            - Jwt__Audience=BreadBankUsers
        ports:
            - "7170:8080"
        depends_on: 
            - db